name: App Pipeline

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '*.md'
      - 'README*'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  # ── 1. Build & Test su develop ─────────────────────────────────────────────
  build:
    name: React Vite Build & Test
    runs-on: arc-runner-react
    steps:
      - uses: actions/checkout@v4
      #- uses: actions/setup-node@v4
      #  with:
      #    node-version: '20'
      - name: Set environment variables
        run: mv .env.example .env
      #- name: Install dependencies
      #  run: yarn install
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build application
        run: yarn build
      - name: Run tests
        run: yarn test
      - name: Run linter
        run: yarn lint
      - name: Check types
        run: yarn check-types

  # ── 2. Se fallisce → triggera failure handler immediatamente ───────────────
  on-failure:
    name: Trigger Failure Handler
    needs: build
    if: failure()
    permissions:
      contents: read
      actions: read
      issues: write
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-failure-handler.yml@bfaa4b61588fbec03b885a2fbf4940537c590658
    secrets:
      COPILOT_ASSIGN_PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
