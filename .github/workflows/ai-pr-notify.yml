name: Copilot PR Notification

on:
  pull_request:
    types: [opened]

permissions:
  contents: read

jobs:
  notify:
    if: contains(github.event.pull_request.user.login, 'copilot')
    uses: org-test-reply-1/platform-ai-workflows/.github/workflows/ai-pr-notify.yml@a87037605c174207eab693e2a868d5b7712a63bb
    permissions:
      contents: read
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
